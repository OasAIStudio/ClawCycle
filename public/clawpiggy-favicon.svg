    <rect x="14" y="22" width="4" height="4" fill="#f7a650"/>
    <rect x="28" y="22" width="4" height="4" fill="#f7a650"/>
    <rect x="20" y="9" width="6" height="2" fill="#fff0e3"/>
    <rect x="34" y="13" width="2" height="2" fill="#2d1810"/>
    <rect x="18" y="12" width="2" height="2" fill="#c4602a"/>
