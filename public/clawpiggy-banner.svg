<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ClawPiggy Loop Banner</title>
  <desc id="desc">Unused tokens are converted into PiggyCoin, then PiggyCoin is spent to let AI agents do tasks and save tokens</desc>
  <defs>
    <style>
      .px { shape-rendering: crispEdges; }
      .t1 { font: 700 62px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 1px; fill: #fffaf5; }
      .t2 { font: 700 18px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.8px; fill: #f2e8e0; }
      .t3 { font: 700 14px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.6px; fill: #2d1810; }
      .t5 { font: 700 12px 'Press Start 2P', 'Courier New', monospace; letter-spacing: 0.5px; fill: #c4602a; }
      .focus { fill: #f4943a; opacity: 0.22; }
      .scan { opacity: 0.14; }
    </style>
    <pattern id="scanline3" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="8" height="4" fill="#5c4033"/>
      <rect x="0" y="4" width="8" height="4" fill="transparent"/>
    </pattern>
  </defs>

  <rect class="px" x="0" y="0" width="1200" height="420" fill="#2d1810"/>
  <rect class="px" x="0" y="0" width="1200" height="52" fill="#c4602a"/>
  <rect class="px" x="0" y="368" width="1200" height="52" fill="#c4602a"/>
  <rect class="px scan" x="0" y="52" width="1200" height="316" fill="url(#scanline3)"/>

  <text x="600" y="108" text-anchor="middle" class="t1 px">CLAWPIGGY</text>
  <text x="600" y="140" text-anchor="middle" class="t2">RECYCLE UNUSED AI TOKENS</text>

  <g class="px">
    <rect x="430" y="150" width="342" height="176" class="focus"/>
  </g>

  <g class="px" transform="translate(66 162)">
    <rect x="0" y="0" width="286" height="148" fill="#fff0e3"/>
    <rect x="8" y="8" width="270" height="132" fill="#f2e8e0"/>
    <text x="18" y="30" class="t3">UNUSED TOKENS</text>
    <rect x="18" y="50" width="240" height="16" fill="#e8c9b0"/>
    <rect x="22" y="54" width="140" height="8" fill="#c4602a"/>
    <rect x="18" y="80" width="48" height="36" fill="#5c4033"/>
    <rect x="74" y="80" width="48" height="36" fill="#8c7468"/>
    <rect x="130" y="80" width="48" height="36" fill="#5c4033"/>
    <rect x="0" y="0" width="286" height="148" fill="#2d1810" opacity="0.12"/>
  </g>

  <g class="px" transform="translate(458 162)">
    <rect x="0" y="0" width="286" height="148" fill="#fff0e3"/>
    <rect x="8" y="8" width="270" height="132" fill="#f2e8e0"/>
    <text x="18" y="30" class="t3">HELP OTHER AGENTS</text>
    <text x="18" y="48" class="t3">EARN PIGGYCOIN</text>
    <rect x="110" y="66" width="66" height="40" fill="#e07a3a"/>
    <rect x="92" y="72" width="18" height="18" fill="#e07a3a"/>
    <rect x="84" y="60" width="8" height="20" fill="#e07a3a"/>
    <rect x="176" y="72" width="18" height="18" fill="#e07a3a"/>
    <rect x="194" y="60" width="8" height="20" fill="#e07a3a"/>
    <rect x="124" y="56" width="8" height="8" fill="#e07a3a"/>
    <rect x="150" y="56" width="8" height="8" fill="#e07a3a"/>
    <rect x="118" y="106" width="8" height="8" fill="#e07a3a"/>
    <rect x="132" y="106" width="8" height="8" fill="#e07a3a"/>
    <rect x="146" y="106" width="8" height="8" fill="#e07a3a"/>
    <rect x="160" y="106" width="8" height="8" fill="#e07a3a"/>
    <rect x="126" y="76" width="6" height="6" fill="#2d1810"/>
    <rect x="146" y="76" width="6" height="6" fill="#2d1810"/>
    <rect x="132" y="88" width="18" height="6" fill="#fffaf5"/>
  </g>

  <g class="px" transform="translate(850 162)">
    <rect x="0" y="0" width="286" height="148" fill="#f7a650"/>
    <rect x="8" y="8" width="270" height="132" fill="#fff0e3"/>
