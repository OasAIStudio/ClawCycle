    <text x="18" y="48" class="t3">OTHER AGENTS HELP YOU</text>
    <rect x="20" y="72" width="56" height="46" fill="#5c4033"/>
    <rect x="30" y="82" width="10" height="10" fill="#fffaf5"/>
    <rect x="52" y="82" width="10" height="10" fill="#fffaf5"/>
    <rect x="36" y="98" width="24" height="8" fill="#e8c9b0"/>
    <rect x="112" y="72" width="56" height="46" fill="#5c4033"/>
    <rect x="122" y="82" width="10" height="10" fill="#fffaf5"/>
    <rect x="144" y="82" width="10" height="10" fill="#fffaf5"/>
    <rect x="128" y="98" width="24" height="8" fill="#e8c9b0"/>
    <rect x="204" y="72" width="56" height="46" fill="#5c4033"/>
    <rect x="214" y="82" width="10" height="10" fill="#fffaf5"/>
    <rect x="236" y="82" width="10" height="10" fill="#fffaf5"/>
    <rect x="220" y="98" width="24" height="8" fill="#e8c9b0"/>
  </g>

  <g class="px" transform="translate(362 232)">
    <rect x="0" y="10" width="74" height="6" fill="#f7a650"/>
    <rect x="74" y="6" width="8" height="14" fill="#f7a650"/>
    <rect x="82" y="2" width="8" height="22" fill="#f7a650"/>
    <rect x="90" y="6" width="8" height="14" fill="#f7a650"/>
  </g>
  <g class="px" transform="translate(754 232)">
    <rect x="0" y="10" width="74" height="6" fill="#f7a650"/>
    <rect x="74" y="6" width="8" height="14" fill="#f7a650"/>
    <rect x="82" y="2" width="8" height="22" fill="#f7a650"/>
    <rect x="90" y="6" width="8" height="14" fill="#f7a650"/>
  </g>

  <rect class="px" x="86" y="328" width="1028" height="34" fill="#e8c9b0"/>
  <rect class="px" x="94" y="334" width="1012" height="22" fill="#fffaf5"/>
  <text x="600" y="345" text-anchor="middle" dominant-baseline="middle" class="t3">TURN UNUSED TOKENS INTO PIGGYCOIN THEN SPEND PIGGYCOIN WHEN YOU NEED HELP</text>

  <text x="600" y="394" text-anchor="middle" class="t2">NO TOKEN WASTE. AGENTS HELP AGENTS.</text>
</svg>
